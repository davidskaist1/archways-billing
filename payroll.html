<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll — Archways ABA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-layout">
        <main class="main-content" id="main-content">
            <div class="page-header">
                <h1>Payroll</h1>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="sessions">Sessions</button>
                <button class="tab-btn" data-tab="calculate">Calculate Payroll</button>
                <button class="tab-btn" data-tab="import-sessions">Import Sessions</button>
            </div>

            <!-- Sessions Tab -->
            <div class="tab-content active" id="tab-sessions">
                <div class="filter-bar">
                    <div class="form-group">
                        <label class="form-label">Date Range</label>
                        <div class="flex gap-1">
                            <input class="form-input" type="date" id="sessions-date-from">
                            <input class="form-input" type="date" id="sessions-date-to">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Staff Member</label>
                        <select class="form-select" id="sessions-staff"><option value="">All Staff</option></select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Session Type</label>
                        <select class="form-select" id="sessions-type">
                            <option value="">All Types</option>
                            <option value="direct">Direct</option>
                            <option value="supervision">Supervision</option>
                            <option value="assessment">Assessment</option>
                            <option value="parent_training">Parent Training</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <div class="form-check" style="margin-top:20px;">
                            <input type="checkbox" id="sessions-converted-only" checked>
                            <label for="sessions-converted-only">Converted only</label>
                        </div>
                    </div>
                    <div class="form-group" style="align-self:end;">
                        <button class="btn btn-secondary" id="sessions-filter-btn">Filter</button>
                    </div>
                </div>
                <div id="sessions-table"></div>
            </div>

            <!-- Calculate Payroll Tab -->
            <div class="tab-content" id="tab-calculate">
                <div class="card mb-3">
                    <div class="card-header">
                        <h3>Pay Period</h3>
                    </div>
                    <div class="flex gap-2 flex-center">
                        <div class="form-group">
                            <label class="form-label">Period Start</label>
                            <input class="form-input" type="date" id="payroll-start">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Period End</label>
                            <input class="form-input" type="date" id="payroll-end">
                        </div>
                        <div class="form-group" style="align-self:end;">
                            <button class="btn btn-primary" id="calculate-btn">Calculate Payroll</button>
                        </div>
                    </div>
                </div>

                <div id="payroll-results" style="display:none;">
                    <div class="flex-between mb-2">
                        <h3 id="payroll-period-label"></h3>
                        <div class="page-actions">
                            <button class="btn btn-success" id="approve-payroll-btn" style="display:none;">Approve All</button>
                            <button class="btn btn-secondary" id="export-payroll-btn">Export CSV</button>
                        </div>
                    </div>
                    <div id="payroll-table"></div>
                    <div class="card mt-2" id="payroll-totals"></div>
                </div>
            </div>

            <!-- Import Sessions Tab -->
            <div class="tab-content" id="tab-import-sessions">
                <div class="card">
                    <div class="card-header"><h3>Import Sessions from Central Reach</h3></div>
                    <div id="import-sessions-zone"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script type="module" src="js/payroll.js"></script>
</body>
</html>
