<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operating Expenses — Archways ABA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-layout">
        <main class="main-content" id="main-content">
            <div class="page-header">
                <h1>Operating Expenses</h1>
                <div class="page-actions">
                    <button class="btn btn-secondary" id="export-btn">📊 Export</button>
                    <button class="btn btn-primary" id="add-btn">+ Add Expense</button>
                </div>
            </div>

            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-label">This Month</div>
                    <div class="kpi-value" id="kpi-month">—</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Year to Date</div>
                    <div class="kpi-value" id="kpi-ytd">—</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Monthly Recurring</div>
                    <div class="kpi-value" id="kpi-recurring">—</div>
                    <div class="kpi-sub">Fixed costs per month</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Total Lifetime</div>
                    <div class="kpi-value" id="kpi-lifetime">—</div>
                </div>
            </div>

            <div class="filter-bar">
                <div class="form-group">
                    <label class="form-label">Date Range</label>
                    <div class="flex gap-1">
                        <input class="form-input" type="date" id="filter-from">
                        <input class="form-input" type="date" id="filter-to">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select class="form-select" id="filter-category">
                        <option value="">All</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Recurring</label>
                    <select class="form-select" id="filter-recurring">
                        <option value="">All</option>
                        <option value="true">Recurring only</option>
                        <option value="false">One-time only</option>
                    </select>
                </div>
            </div>

            <div id="expenses-table"></div>
        </main>
    </div>

    <script src="/.netlify/functions/config"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script type="module" src="js/operating-expenses.js"></script>
</body>
</html>
