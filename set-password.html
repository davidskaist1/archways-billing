<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <title>Set Your Password — Archways ABA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-brand">
                <div class="brand-icon">A</div>
                <h1>Archways ABA</h1>
                <p id="subtitle">Set Your Password</p>
            </div>

            <div class="login-error" id="msg"></div>

            <div id="loading" class="text-center" style="padding:20px 0;">
                <div class="spinner" style="margin:0 auto;"></div>
                <p class="text-sm text-muted mt-2">Verifying your invite…</p>
            </div>

            <form class="login-form" id="set-password-form" style="display:none;">
                <p class="text-sm text-muted mb-2" id="welcome-msg">Welcome! Create a password to finish setting up your account.</p>
                <div class="form-group">
                    <label class="form-label" for="password">New Password</label>
                    <input class="form-input" type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm">Confirm Password</label>
                    <input class="form-input" type="password" id="confirm" name="confirm" required minlength="8" placeholder="Re-enter your password" autocomplete="new-password">
                </div>
                <button class="btn btn-primary" type="submit" id="save-btn">Set Password & Continue</button>
            </form>

            <div id="expired" style="display:none;">
                <p class="text-sm mb-2">This invite link is invalid or expired. Please contact your administrator to send a new one.</p>
                <a href="index.html" class="btn btn-secondary" style="width:100%;justify-content:center;">Back to Sign In</a>
            </div>
        </div>
    </div>

    <script src="/.netlify/functions/config"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { supabase } from './js/supabase-client.js';

        const msgEl = document.getElementById('msg');
        const loadingEl = document.getElementById('loading');
        const formEl = document.getElementById('set-password-form');
        const expiredEl = document.getElementById('expired');
        const welcomeEl = document.getElementById('welcome-msg');

        function showError(text) {
            msgEl.textContent = text;
            msgEl.style.display = 'block';
        }

        function hideError() {
            msgEl.style.display = 'none';
        }

        async function init() {
            // Supabase auto-detects the access token in the URL hash
            // and creates a session. Give it a moment to settle.
            await new Promise(r => setTimeout(r, 200));

            const { data: { session }, error } = await supabase.auth.getSession();

            if (error || !session) {
                loadingEl.style.display = 'none';
                expiredEl.style.display = 'block';
                return;
            }

            loadingEl.style.display = 'none';
            formEl.style.display = 'block';

            // Personalize greeting if we can
            const user = session.user;
            const firstName = user?.user_metadata?.first_name;
            if (firstName) {
                welcomeEl.textContent = `Welcome, ${firstName}! Create a password to finish setting up your account.`;
            }
        }

        formEl.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            if (password.length < 8) {
                showError('Password must be at least 8 characters.');
                return;
            }
            if (password !== confirm) {
                showError('Passwords do not match.');
                return;
            }

            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving…';

            try {
                const { error } = await supabase.auth.updateUser({ password });
                if (error) throw error;

                // Track this as their first login
                await supabase.rpc('update_last_login');

                // Now figure out their role and redirect to the right landing page
                const { data: { user } } = await supabase.auth.getUser();
                const { data: appUser } = await supabase
                    .from('app_users')
                    .select('role')
                    .eq('auth_user_id', user.id)
                    .eq('is_active', true)
                    .single();

                const landing = appUser?.role === 'investor' ? 'investor-dashboard.html' : 'dashboard.html';
                window.location.href = landing;
            } catch (err) {
                showError('Failed to set password: ' + (err.message || 'unknown error'));
                saveBtn.disabled = false;
                saveBtn.textContent = 'Set Password & Continue';
            }
        });

        init();
    </script>
</body>
</html>
