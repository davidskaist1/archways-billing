<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <title>Staff — Archways ABA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-layout">
        <main class="main-content" id="main-content">
            <div class="page-header">
                <h1>Staff Management</h1>
                <div class="page-actions">
                    <button class="btn btn-primary" id="add-staff-btn">+ Add Staff</button>
                </div>
            </div>

            <div class="filter-bar">
                <div class="form-group">
                    <label class="form-label">Search</label>
                    <input class="form-input" type="text" id="filter-search" placeholder="Name or email...">
                </div>
                <div class="form-group">
                    <label class="form-label">Role</label>
                    <select class="form-select" id="filter-role">
                        <option value="">All Roles</option>
                        <option value="admin">Admin</option>
                        <option value="billing">Billing</option>
                        <option value="payroll">Payroll</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Credential</label>
                    <select class="form-select" id="filter-credential">
                        <option value="">All</option>
                        <option value="RBT">RBT</option>
                        <option value="BCBA">BCBA</option>
                        <option value="BCaBA">BCaBA</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select class="form-select" id="filter-active">
                        <option value="true">Active</option>
                        <option value="false">Inactive</option>
                        <option value="">All</option>
                    </select>
                </div>
            </div>

            <div id="staff-table"></div>
        </main>
    </div>

    <script src="/.netlify/functions/config"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/staff.js"></script>
</body>
</html>
