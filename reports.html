<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports — Archways ABA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-layout">
        <main class="main-content" id="main-content">
            <div class="page-header">
                <h1>Reports</h1>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="aging">Claims Aging</button>
                <button class="tab-btn" data-tab="revenue">Revenue by Payer</button>
                <button class="tab-btn" data-tab="productivity">Staff Productivity</button>
                <button class="tab-btn" data-tab="payroll-summary">Payroll Summary</button>
            </div>

            <!-- Aging Report -->
            <div class="tab-content active" id="tab-aging">
                <div class="filter-bar">
                    <div class="form-group">
                        <label class="form-label">Payer</label>
                        <select class="form-select" id="aging-payer"><option value="">All Payers</option></select>
                    </div>
                    <div class="form-group" style="align-self:end;">
                        <button class="btn btn-secondary" id="aging-run-btn">Generate</button>
                        <button class="btn btn-ghost" id="aging-export-btn">Export CSV</button>
                    </div>
                </div>
                <div class="card mb-3">
                    <canvas id="aging-chart" height="250"></canvas>
                </div>
                <div id="aging-table"></div>
            </div>

            <!-- Revenue by Payer -->
            <div class="tab-content" id="tab-revenue">
                <div class="filter-bar">
                    <div class="form-group">
                        <label class="form-label">Date Range</label>
                        <div class="flex gap-1">
                            <input class="form-input" type="date" id="revenue-from">
                            <input class="form-input" type="date" id="revenue-to">
                        </div>
                    </div>
                    <div class="form-group" style="align-self:end;">
                        <button class="btn btn-secondary" id="revenue-run-btn">Generate</button>
                        <button class="btn btn-ghost" id="revenue-export-btn">Export CSV</button>
                    </div>
                </div>
                <div class="grid-2 gap-lg">
                    <div class="card"><canvas id="revenue-chart" height="300"></canvas></div>
                    <div class="card" id="revenue-table-card"><div id="revenue-table"></div></div>
                </div>
            </div>

            <!-- Staff Productivity -->
            <div class="tab-content" id="tab-productivity">
                <div class="filter-bar">
                    <div class="form-group">
                        <label class="form-label">Date Range</label>
                        <div class="flex gap-1">
                            <input class="form-input" type="date" id="prod-from">
                            <input class="form-input" type="date" id="prod-to">
                        </div>
                    </div>
                    <div class="form-group" style="align-self:end;">
                        <button class="btn btn-secondary" id="prod-run-btn">Generate</button>
                        <button class="btn btn-ghost" id="prod-export-btn">Export CSV</button>
                    </div>
                </div>
                <div class="card mb-3"><canvas id="prod-chart" height="250"></canvas></div>
                <div id="prod-table"></div>
            </div>

            <!-- Payroll Summary -->
            <div class="tab-content" id="tab-payroll-summary">
                <div class="filter-bar">
                    <div class="form-group">
                        <label class="form-label">Period Start</label>
                        <input class="form-input" type="date" id="paysum-start">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Period End</label>
                        <input class="form-input" type="date" id="paysum-end">
                    </div>
                    <div class="form-group" style="align-self:end;">
                        <button class="btn btn-secondary" id="paysum-run-btn">Generate</button>
                        <button class="btn btn-ghost" id="paysum-export-btn">Export CSV</button>
                    </div>
                </div>
                <div id="paysum-table"></div>
                <div class="card mt-2" id="paysum-totals"></div>
            </div>
        </main>
    </div>

    <script src="/.netlify/functions/config"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script type="module" src="js/reports.js"></script>
</body>
</html>
